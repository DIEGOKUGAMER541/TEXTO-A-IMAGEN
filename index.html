      .about-btn {

<body>
  <h1>Convertidor de Texto a Imagen</h1>

  <textarea id="texto" placeholder="Escribe tu texto aquí..."></textarea><br>

  <label>Color fondo:</label><input type="color" id="colorFondo" value="#ffffff"><br>

  <div class="control-tamano"> <input type="number" id="tamano" value="30" min="10" max="100"> </div><br>
  <label><input type="checkbox" id="sinFondo">Imagen sin fondo</label>
  <button onclick="generarImagen()">Generar Imagen</button>
  <button onclick="descargarImagen()">Descargar</button>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    function generarImagen() {
      const texto = document.getElementById("texto").value;
      const colorTexto = document.getElementById("colorTexto").value;
      const colorFondo = document.getElementById("colorFondo").value;
      const tamano = parseInt(document.getElementById("tamano").value);
      const sinFondo = document.getElementById("sinFondo").checked;
    
      const padding = 20;
    
      ctx.font = tamano + "px Arial";
    
      const lineas = texto.split("\n");
    
      let maxWidth = 0;
      lineas.forEach(linea => {
        const width = ctx.measureText(linea).width;
        if (width > maxWidth) maxWidth = width;
      });
    
      const lineHeight = tamano + 10;
      const alturaTotal = lineas.length * lineHeight;
    
      canvas.width = maxWidth + padding * 2;
      canvas.height = alturaTotal + padding * 2;
    
      ctx.font = tamano + "px Arial";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
    
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    
      if (!sinFondo) {
        ctx.fillStyle = colorFondo;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    
      ctx.fillStyle = colorTexto;
    
      let y = padding;
    
      lineas.forEach(linea => {
        ctx.fillText(linea, padding, y);
        y += lineHeight;
      });
    }
    function descargarImagen() {
      const link = document.createElement("a");
      link.download = "imagen.png";
      link.href = canvas.toDataURL();
      link.click();
    }
function cambiarTamano(valor) {
  const input = document.getElementById("tamano");
  input.value = Math.max(5, parseInt(input.value) + valor);
}
    function toggleAbout() {
    const panel = document.getElementById("aboutPanel");
    panel.classList.toggle("active");
    }
  </script>
